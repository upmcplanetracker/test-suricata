services:
  suricata:
    image: jasonish/suricata:7.0
    container_name: suricata_test
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - suricata-logs:/var/log/suricata
      - suricata-rules:/var/lib/suricata
      - suricata-config:/etc/suricata
    command: -i ${MONITOR_IFACE}

  evebox:
    image: jasonish/evebox:0.18
    container_name: evebox_ui
    restart: unless-stopped
    ports:
      - "5636:5636"
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - evebox-data:/var/lib/evebox
    command: >
      evebox server
      --datastore sqlite
      --data-directory /var/lib/evebox
      --input /var/log/suricata/eve.json

volumes:
  suricata-logs:
  suricata-rules:
  suricata-config:
  evebox-data:
